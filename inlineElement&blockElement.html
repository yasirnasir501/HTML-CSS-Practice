<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline & Block Element</title>
</head>
<body>
    <h1>Inline & Block Element</h1>

    <p style="border: 2px solid red;">HTML (Block Element)</p>
    <div style="border: 2px solid blue;">CSS (Block Element)</div>
    <br>
    <a href="" style="border: 2px solid red;">Yasir (Inline Element)</a>
    <ul style="border: 2px solid rgba(153, 255, 0, 0.671);">
        <li style="border: 2px solid red;">Apple (Block Element)</li>
    </ul>
    <b style="border: 2px solid red;"> Car (Inline Element)</b>
    <em style="border: 2px solid red;">Audi (Inline Element)</em>
    <span style="border: 2px solid darkgoldenrod;">Times Of Karachi Weather Update (Inline Element)</span>
</body>
</html>
